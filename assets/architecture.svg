<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="monospace">
  <rect width="900" height="480" fill="#0d1117"/>

  <!-- Left: User -->
  <rect x="20" y="150" width="200" height="120" rx="12" fill="#161b22" stroke="#30363d" stroke-width="2"/>
  <text x="120" y="178" fill="#c9d1d9" font-size="16" text-anchor="middle" font-weight="bold">👤 User</text>
  <text x="120" y="200" fill="#8b949e" font-size="12" text-anchor="middle">Browser / HP</text>
  <text x="120" y="220" fill="#8b949e" font-size="12" text-anchor="middle">Paste link video</text>
  <text x="120" y="240" fill="#8b949e" font-size="12" text-anchor="middle">Download MP4/MP3</text>

  <!-- Arrow User → Nginx -->
  <line x1="220" y1="210" x2="290" y2="210" stroke="#30363d" stroke-width="2"/>
  <polygon points="285,205 295,210 285,215" fill="#30363d"/>
  <text x="255" y="200" fill="#8b949e" font-size="10" text-anchor="middle">HTTPS</text>

  <!-- Cloudflare Section -->
  <rect x="20" y="20" width="860" height="440" rx="12" fill="none" stroke="#30363d" stroke-width="1" stroke-dasharray="5,3"/>

  <!-- Host Box -->
  <rect x="300" y="30" width="560" height="420" rx="12" fill="#161b22" stroke="#58a6ff" stroke-width="2"/>
  <text x="320" y="58" fill="#58a6ff" font-size="16" font-weight="bold">Server (CT 117 — social-downloader)</text>

  <!-- Nginx Reverse Proxy -->
  <rect x="320" y="80" width="240" height="60" rx="8" fill="#1c2128" stroke="#f0883e"/>
  <text x="440" y="105" fill="#f0883e" font-size="14" text-anchor="middle" font-weight="bold">Nginx Reverse Proxy</text>
  <text x="440" y="125" fill="#8b949e" font-size="12" text-anchor="middle">Host port 8080 → CT port 8000</text>

  <!-- Arrow Nginx → FastAPI -->
  <line x1="440" y1="140" x2="440" y2="170" stroke="#30363d" stroke-width="2"/>
  <polygon points="435,165 440,175 445,165" fill="#30363d"/>

  <!-- FastAPI Backend -->
  <rect x="320" y="180" width="240" height="70" rx="8" fill="#1c2128" stroke="#3fb950"/>
  <text x="440" y="205" fill="#3fb950" font-size="14" text-anchor="middle" font-weight="bold">FastAPI Backend</text>
  <text x="440" y="225" fill="#8b949e" font-size="12" text-anchor="middle">Python / Uvicorn</text>
  <text x="440" y="240" fill="#8b949e" font-size="11" text-anchor="middle">Port 8000</text>

  <!-- Arrow FastAPI → Static -->
  <line x1="320" y1="215" x2="250" y2="215" stroke="#30363d" stroke-width="2"/>
  <polygon points="255,210 245,215 255,220" fill="#30363d"/>

  <!-- Static Files -->
  <rect x="120" y="80" width="120" height="60" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="180" y="105" fill="#c9d1d9" font-size="13" text-anchor="middle">📁 Static Files</text>
  <text x="180" y="125" fill="#8b949e" font-size="11" text-anchor="middle">HTML / CSS / JS</text>

  <!-- Arrow FastAPI → Services -->
  <line x1="560" y1="215" x2="620" y2="215" stroke="#30363d" stroke-width="2"/>
  <polygon points="615,210 625,215 615,220" fill="#30363d"/>

  <!-- Services Box -->
  <rect x="630" y="130" width="210" height="170" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="735" y="155" fill="#c9d1d9" font-size="13" text-anchor="middle" font-weight="bold">Services</text>

  <rect x="645" y="170" width="180" height="35" rx="5" fill="#0d1117" stroke="#30363d"/>
  <text x="735" y="193" fill="#c9d1d9" font-size="12" text-anchor="middle">yt-dlp Downloader</text>

  <rect x="645" y="210" width="180" height="35" rx="5" fill="#0d1117" stroke="#30363d"/>
  <text x="735" y="233" fill="#c9d1d9" font-size="12" text-anchor="middle">SSE Progress Stream</text>

  <rect x="645" y="250" width="180" height="35" rx="5" fill="#0d1117" stroke="#30363d"/>
  <text x="735" y="273" fill="#c9d1d9" font-size="12" text-anchor="middle">Auto File Cleanup</text>

  <!-- Arrow Services → Internet -->
  <line x1="735" y1="300" x2="735" y2="340" stroke="#30363d" stroke-width="2"/>
  <polygon points="730,335 735,345 740,335" fill="#30363d"/>

  <!-- Internet Social Media -->
  <rect x="320" y="350" width="520" height="80" rx="8" fill="#1c2128" stroke="#f0883e"/>
  <text x="580" y="375" fill="#f0883e" font-size="14" text-anchor="middle" font-weight="bold">Internet — Social Media Platforms</text>
  <text x="580" y="395" fill="#8b949e" font-size="12" text-anchor="middle">TikTok · YouTube · Instagram · Reddit · Facebook</text>
  <text x="580" y="415" fill="#8b949e" font-size="11" text-anchor="middle">yt-dlp extracts video/audio via public APIs or scrapers</text>

  <!-- Legend -->
  <rect x="120" y="400" width="170" height="60" rx="8" fill="#1c2128" stroke="#30363d"/>
  <text x="135" y="420" fill="#c9d1d9" font-size="12" font-weight="bold">Legend</text>
  <rect x="135" y="430" width="10" height="10" fill="#3fb950"/>
  <text x="152" y="439" fill="#8b949e" font-size="10">Backend Service</text>
  <rect x="135" y="446" width="10" height="10" fill="#f0883e"/>
  <text x="152" y="455" fill="#8b949e" font-size="10">External / Proxy</text>

  <!-- Flow numbers -->
  <circle cx="760" cy="90" r="11" fill="#1c2128" stroke="#3fb950"/>
  <text x="760" y="95" fill="#3fb950" font-size="11" text-anchor="middle">1</text>
  <text x="780" y="95" fill="#8b949e" font-size="10">User pastes link</text>

  <circle cx="760" cy="110" r="11" fill="#1c2128" stroke="#f0883e"/>
  <text x="760" y="115" fill="#f0883e" font-size="11" text-anchor="middle">2</text>
  <text x="780" y="115" fill="#8b949e" font-size="10">yt-dlp downloads</text>

  <circle cx="760" cy="130" r="11" fill="#1c2128" stroke="#3fb950"/>
  <text x="760" y="135" fill="#3fb950" font-size="11" text-anchor="middle">3</text>
  <text x="780" y="135" fill="#8b949e" font-size="10">Streams to browser</text>
</svg>
